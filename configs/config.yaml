project:
  name: credit-card-churn-scoring
  package_name: churn_scoring
  version: 0.1.0

data:
  raw_path: data/raw/BankChurners.csv
  interim_path: data/interim/churn_base.parquet
  validated_path: data/processed/churn_validated.parquet
  target_column: Attrition_Flag

model:
  random_state: 42
  test_size: 0.2
  scoring_metric: f1
  sklearn_model_path: models/gradient_boosting_tuned_pipeline.jobli
  pytorch_model_path: models/churn_mlp_state_dict.pt
  pytorch_preprocessor_path: models/pytorch_preprocessor.joblib

mlflow:
  experiment_name: credit-card-churn-scoring
  tracking_uri: mlruns
